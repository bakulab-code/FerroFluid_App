name: FerroFluid support request
description: Report an app problem or ask for help with FerroFluid.
title: "[Support] "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contacting FerroFluid Support. Do not include passwords, payment information, Apple Account details, or other sensitive personal information.
  - type: input
    id: device
    attributes:
      label: Device
      description: For example, iPhone SE (3rd generation) or iPad Pro 11-inch.
      placeholder: iPhone or iPad model
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: iOS or iPadOS version
      placeholder: For example, iOS 18.5
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: FerroFluid version
      description: Find this in FerroFluid under More, then App Information.
      placeholder: For example, 1.0.0 (3)
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Area
      options:
        - Purchase or restore
        - Recording or Photos
        - Sound or music
        - Visuals or performance
        - Controls or interface
        - Privacy
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the actions that make the problem happen.
      placeholder: |
        1. Open FerroFluid
        2. Select ...
        3. ...
    validations:
      required: false
  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy confirmation
      options:
        - label: I have not included passwords, payment information, Apple Account details, or other sensitive personal information.
          required: true
